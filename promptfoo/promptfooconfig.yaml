providers:
  - id: openrouter:google/gemini-2.5-flash-lite
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKey: "${OPENROUTER_API_KEY}"
      temperature: 0.0
      max_tokens: 600

defaultTest:
  options:
    runSerially: true

prompts:
  - id: answer-current
    raw: |
      {{system_prompt}}

      ---

      Исходные данные:
      {{data}}

      Новый запрос: {{query}}

tests:
  # ГРУППА 1: Факты — не галлюцинирует
  - description: "T1: не выдумывает ЖК и цены"
    vars:
      system_prompt: file://answer_prompt.txt
      data: |
        ЖК «Новые Котельники»: от 9,8 млн руб., 48-58 м², м. Котельники.
        ЖК «Оранж Парк»: от 12,5 млн руб., 50-65 м², м. Котельники.
        ЖК «Кузьминский лес»: от 11,2 млн руб., 45-55 м².
      query: "двушка в котельниках"
    assert:
      - type: contains
        value: "Котельники"
      - type: not-contains
        value: "Скандинавия"
      - type: not-contains
        value: "Бунинские луга"
      - type: not-contains
        value: "9.6 млн"
      - type: not-contains
        value: "42 м²"

  - description: "T2: уточнение по конкретному ЖК"
    vars:
      system_prompt: file://answer_prompt.txt
      data: |
        ЖК «Символ»: от 14 млн руб., 38-95 м², рядом с метро.
      query: "что в символе есть?"
    assert:
      - type: contains
        value: "Символ"
      - type: contains
        value: "14 млн"
      - type: not-contains
        value: "однушка"
      - type: not-contains
        value: "студия"

  - description: "T3: только студии, клиент хочет двушку"
    vars:
      system_prompt: file://answer_prompt.txt
      data: |
        ЖК «Студия Парк»: от 4,2 млн руб., 22-28 м².
        ЖК «Компакт»: от 4,8 млн руб., 24-30 м².
      query: "двушка до 6 млн"
    assert:
      # Не должен выдумывать двушки
      - type: not-contains
        value: "двушка от 4"
      - type: not-contains
        value: "50 м²"
      - type: not-contains
        value: "52 м²"
      - type: not-contains
        value: "60 м²"
      # Должен либо сказать что двушек нет, либо предложить альтернативу (студию)
      - type: icontains-any
        value: ["не нашлось", "нет двушек", "только студии", "студи", "однушк", "Компакт", "Студия Парк"]

  # ГРУППА 2: Продажная механика
  - description: "T4: задаёт уточняющий вопрос"
    vars:
      system_prompt: file://answer_prompt.txt
      data: |
        ЖК «Новые Котельники»: от 9,8 млн руб., 48-58 м², м. Котельники, срок сдачи 2026.
        ЖК «Оранж Парк»: от 12,5 млн руб., 50-65 м², м. Котельники, ипотека от 4.9%.
      query: "двушка в котельниках"
    assert:
      - type: contains
        value: "Котельники"
      - type: regex
        value: "\\?"
      - type: not-contains
        value: "Скандинавия"

  - description: "T5: подсвечивает выгоду из данных"
    vars:
      system_prompt: file://answer_prompt.txt
      data: |
        ЖК «Новые Котельники»: от 9,8 млн руб., 48-58 м², м. Котельники, срок сдачи IV кв 2026.
        ЖК «Оранж Парк»: от 12,5 млн руб., 50-65 м², м. Котельники, рассрочка 0%.
      query: "что есть в котельниках?"
    assert:
      - type: contains
        value: "Котельники"
      - type: icontains-any
        value: ["метро", "сдач", "рассрочк", "ипотек"]

  - description: "T6: НЕ благодарит и НЕ извиняется"
    vars:
      system_prompt: file://answer_prompt.txt
      data: |
        ЖК «Новые Котельники»: от 9,8 млн руб., 48-58 м².
      query: "покажите двушку"
    assert:
      - type: contains
        value: "Котельники"
      - type: not-contains
        value: "Спасибо за"
      - type: not-contains
        value: "Спасибо, что"
      - type: not-contains
        value: "Благодарю за"
      - type: not-contains
        value: "Уважаем"

  - description: "T7: на Вы"
    vars:
      system_prompt: file://answer_prompt.txt
      data: |
        ЖК «Символ»: от 14 млн руб., 38-95 м², рядом с метро.
      query: "что в символе?"
    assert:
      - type: contains
        value: "Символ"
      - type: not-contains
        value: "ты хочешь"
      - type: not-contains
        value: "ищешь для себя"
      - type: icontains-any
        value: ["Вы ", "Вы,", "Вас ", "Ваш", "вам", "Вам", "обратите", "Обратите", "для вас", "Для вас", "для Вас"]

  - description: "T8: колебание → предложить следующий шаг"
    vars:
      system_prompt: file://answer_prompt.txt
      data: |
        ЖК «Новые Котельники»: от 9,8 млн руб., 48-58 м², м. Котельники, срок сдачи IV кв 2026.
      query: "ну не знаю, может потом"
    assert:
      - type: contains
        value: "Котельники"
      - type: icontains-any
        value: ["посмотреть", "показ", "покажу", "встреч", "связать", "консультац", "записать", "подобрать", "подберу", "сравнит"]
